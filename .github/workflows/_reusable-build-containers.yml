name: _Reusable Build Containers (internal use only)

on:
  workflow_call:
    inputs:
      container_type:
        description: 'Type of container to build'
        required: true
        type: string  # 'core', 'full', 'dev', 'custom', 'experiment'

      # Common inputs
      build_platforms:
        description: 'Platforms to build for'
        required: false
        default: 'linux/amd64,linux/arm64'
        type: string

      image_prefix:
        description: 'Image prefix (e.g., "sst", "sst-dev")'
        required: true
        type: string

      tag_suffix:
        description: 'Tag suffix for the built images'
        required: false
        default: ''
        type: string

      # SST-specific inputs
      sst_version:
        description: 'SST version (for release builds)'
        required: false
        type: string

      sst_elements_version:
        description: 'SST-elements version override (defaults to sst_version)'
        required: false
        type: string

      mpich_version:
        description: 'MPICH version'
        required: false
        default: '4.0.2'
        type: string

      # Custom/Experiment specific
      sst_core_repo:
        description: 'SST-core repository URL'
        required: false
        type: string

      sst_core_ref:
        description: 'SST-core reference'
        required: false
        type: string

      sst_elements_repo:
        description: 'SST-elements repository URL'
        required: false
        type: string

      sst_elements_ref:
        description: 'SST-elements reference'
        required: false
        type: string

      experiment_name:
        description: 'Experiment name (for experiment builds)'
        required: false
        type: string

      base_image:
        description: 'Base image for experiment builds'
        required: false
        type: string

      # Advanced options
      force_rebuild:
        description: 'Force rebuild even if images exist'
        required: false
        default: false
        type: boolean

      ignore_cache:
        description: 'Ignore build cache'
        required: false
        default: false
        type: boolean

      tag_as_latest:
        description: 'Also publish the built manifest as latest'
        required: false
        default: false
        type: boolean

      publish_master_latest:
        description: 'Also publish the built manifest as master-latest'
        required: false
        default: false
        type: boolean

      enable_perf_tracking:
        description: 'Enable SST performance tracking'
        required: false
        default: false
        type: boolean

    outputs:
      built_images:
        description: 'JSON array of built image tags'
        value: ${{ jobs.create-manifest.outputs.built_images }}

      manifest_tag:
        description: 'Fat manifest tag'
        value: ${{ jobs.create-manifest.outputs.manifest_tag }}

      resolved_tag_suffix:
        description: 'Resolved tag suffix after planner defaults are applied'
        value: ${{ jobs.prepare-build-plan.outputs.resolved_tag_suffix }}

      validation_mode:
        description: 'Validation mode selected by the planner'
        value: ${{ jobs.prepare-build-plan.outputs.validation_mode }}

      max_image_size_mb:
        description: 'Maximum image size selected by the planner'
        value: ${{ jobs.prepare-build-plan.outputs.max_image_size_mb }}

      alias_tags_json:
        description: 'JSON array of alias manifest tags selected by the planner'
        value: ${{ jobs.prepare-build-plan.outputs.alias_tags_json }}

      build_successful:
        description: 'Whether build was successful'
        value: ${{ jobs.create-manifest.outputs.manifest_tag != '' }}

env:
  REGISTRY: ghcr.io
  BUILD_NCPUS: 2

jobs:
  prepare-build-plan:
    runs-on: ubuntu-latest
    outputs:
      platform_matrix: ${{ steps.plan.outputs.platform_matrix }}
      bake_definition_json: ${{ steps.plan.outputs.bake_definition_json }}
      manifest_tag: ${{ steps.plan.outputs.manifest_tag }}
      resolved_tag_suffix: ${{ steps.plan.outputs.resolved_tag_suffix }}
      validation_mode: ${{ steps.plan.outputs.validation_mode }}
      max_image_size_mb: ${{ steps.plan.outputs.max_image_size_mb }}
      alias_tags_json: ${{ steps.plan.outputs.alias_tags_json }}
      download_mpich: ${{ steps.plan.outputs.download_mpich }}
      download_sst_core: ${{ steps.plan.outputs.download_sst_core }}
      download_sst_elements: ${{ steps.plan.outputs.download_sst_elements }}
      mpich_version: ${{ steps.plan.outputs.mpich_version }}
      sst_version: ${{ steps.plan.outputs.sst_version }}
      sst_elements_version: ${{ steps.plan.outputs.sst_elements_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Prepare workflow build plan
        id: plan
        env:
          CONTAINER_TYPE: ${{ inputs.container_type }}
          IMAGE_PREFIX: ${{ inputs.image_prefix }}
          BUILD_PLATFORMS: ${{ inputs.build_platforms }}
          TAG_SUFFIX: ${{ inputs.tag_suffix }}
          REGISTRY: ${{ env.REGISTRY }}
          SST_VERSION: ${{ inputs.sst_version }}
          SST_ELEMENTS_VERSION: ${{ inputs.sst_elements_version }}
          MPICH_VERSION: ${{ inputs.mpich_version }}
          BUILD_NCPUS: ${{ env.BUILD_NCPUS }}
          SST_CORE_REPO: ${{ inputs.sst_core_repo }}
          SST_CORE_REF: ${{ inputs.sst_core_ref }}
          SST_ELEMENTS_REPO: ${{ inputs.sst_elements_repo }}
          SST_ELEMENTS_REF: ${{ inputs.sst_elements_ref }}
          ENABLE_PERF_TRACKING: ${{ inputs.enable_perf_tracking }}
          EXPERIMENT_NAME: ${{ inputs.experiment_name }}
          BASE_IMAGE: ${{ inputs.base_image }}
          IGNORE_CACHE: ${{ inputs.ignore_cache }}
          TAG_AS_LATEST: ${{ inputs.tag_as_latest }}
          PUBLISH_MASTER_LATEST: ${{ inputs.publish_master_latest }}
        run: ./scripts/orchestration/prepare-workflow-build.sh

  build-containers:
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    needs: [prepare-build-plan]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix: ${{ fromJson(needs.prepare-build-plan.outputs.platform_matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Cache MPICH tarball
        id: cache-mpich
        if: needs.prepare-build-plan.outputs.download_mpich == 'true'
        uses: actions/cache@v5
        with:
          path: Containerfiles/mpich-${{ needs.prepare-build-plan.outputs.mpich_version }}.tar.gz
          key: mpich-${{ needs.prepare-build-plan.outputs.mpich_version }}

      - name: Download MPICH source
        if: needs.prepare-build-plan.outputs.download_mpich == 'true' && steps.cache-mpich.outputs.cache-hit != 'true'
        working-directory: Containerfiles
        run: ../scripts/build/download_tarballs.sh --mpich-version ${{ needs.prepare-build-plan.outputs.mpich_version }}

      - name: Determine SST cache key and paths
        id: sst-cache-config
        if: needs.prepare-build-plan.outputs.download_sst_core == 'true'
        run: |
          if [[ "${{ needs.prepare-build-plan.outputs.download_sst_elements }}" == 'true' ]]; then
            ELEMENTS_VERSION="${{ needs.prepare-build-plan.outputs.sst_elements_version }}"
            echo "needs_elements=true" >> $GITHUB_OUTPUT
            echo "effective_elements_version=${ELEMENTS_VERSION}" >> $GITHUB_OUTPUT
            echo "cache_key=sst-sources-full-${{ needs.prepare-build-plan.outputs.sst_version }}-${ELEMENTS_VERSION}" >> $GITHUB_OUTPUT
          else
            echo "needs_elements=false" >> $GITHUB_OUTPUT
            echo "cache_key=sst-sources-core-${{ needs.prepare-build-plan.outputs.sst_version }}" >> $GITHUB_OUTPUT
          fi

      - name: Cache SST sources (core-only)
        id: cache-sst-core
        if: needs.prepare-build-plan.outputs.download_sst_core == 'true' && steps.sst-cache-config.outputs.needs_elements == 'false'
        uses: actions/cache@v5
        with:
          path: Containerfiles/sstcore-${{ needs.prepare-build-plan.outputs.sst_version }}.tar.gz
          key: ${{ steps.sst-cache-config.outputs.cache_key }}

      - name: Cache SST sources (full)
        id: cache-sst-full
        if: needs.prepare-build-plan.outputs.download_sst_core == 'true' && steps.sst-cache-config.outputs.needs_elements == 'true'
        uses: actions/cache@v5
        with:
          path: |
            Containerfiles/sstcore-${{ needs.prepare-build-plan.outputs.sst_version }}.tar.gz
            Containerfiles/sstelements-${{ steps.sst-cache-config.outputs.effective_elements_version }}.tar.gz
          key: ${{ steps.sst-cache-config.outputs.cache_key }}

      - name: Download SST sources
        if: needs.prepare-build-plan.outputs.download_sst_core == 'true' && ((steps.sst-cache-config.outputs.needs_elements == 'false' && steps.cache-sst-core.outputs.cache-hit != 'true') || (steps.sst-cache-config.outputs.needs_elements == 'true' && steps.cache-sst-full.outputs.cache-hit != 'true'))
        working-directory: Containerfiles
        run: |
          if [[ "${{ steps.sst-cache-config.outputs.needs_elements }}" == "true" ]]; then
            ../scripts/build/download_tarballs.sh --sst-version "${{ needs.prepare-build-plan.outputs.sst_version }}" --sst-elements-version "${{ steps.sst-cache-config.outputs.effective_elements_version }}"
          else
            ../scripts/build/download_tarballs.sh --sst-version "${{ needs.prepare-build-plan.outputs.sst_version }}"
          fi

      - name: Validate SST sources
        if: needs.prepare-build-plan.outputs.download_sst_core == 'true'
        working-directory: Containerfiles
        run: |
          if [ ! -f "sstcore-${{ needs.prepare-build-plan.outputs.sst_version }}.tar.gz" ]; then
            echo "ERROR: SST-core source file sstcore-${{ needs.prepare-build-plan.outputs.sst_version }}.tar.gz not found"
            exit 1
          fi

          if [[ "${{ steps.sst-cache-config.outputs.needs_elements }}" == "true" ]]; then
            if [ ! -f "sstelements-${{ steps.sst-cache-config.outputs.effective_elements_version }}.tar.gz" ]; then
              echo "ERROR: SST-elements source file sstelements-${{ steps.sst-cache-config.outputs.effective_elements_version }}.tar.gz not found"
              exit 1
            fi
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure local source placeholder exists
        if: startsWith(matrix.bake_target, 'custom-') || (inputs.container_type == 'core' && inputs.sst_version == '') || (inputs.container_type == 'full' && inputs.sst_version == '')
        run: |
          mkdir -p Containerfiles/.local-sources/sst-core
          touch Containerfiles/.local-sources/sst-core/.gitkeep

      - name: Write Buildx bake definition
        env:
          BAKE_DEFINITION_JSON: ${{ needs.prepare-build-plan.outputs.bake_definition_json }}
        run: |
          printf '%s\n' "$BAKE_DEFINITION_JSON" > docker-bake.json
          jq . docker-bake.json

      - name: Build and push container
        run: |
          docker buildx bake \
            --file docker-bake.json \
            --push \
            --progress plain \
            "${{ matrix.bake_target }}"

      - name: Output built image
        run: |
          echo "Built image: ${{ matrix.image_tag }}"

      - name: Check if MPICH artifact exists
        id: check-mpich-artifact
        if: needs.prepare-build-plan.outputs.download_mpich == 'true' && steps.cache-mpich.outputs.cache-hit != 'true'
        run: |
          ARTIFACT_NAME="mpich-${{ needs.prepare-build-plan.outputs.mpich_version }}"
          echo "artifact_name=${ARTIFACT_NAME}" >> $GITHUB_OUTPUT

          # Check if artifact already exists from another job
          if gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts --paginate | jq -r '.artifacts[].name' | grep -Fxq "${ARTIFACT_NAME}"; then
            echo "artifact_exists=true" >> $GITHUB_OUTPUT
            echo "MPICH artifact ${ARTIFACT_NAME} already exists, skipping upload"
          else
            echo "artifact_exists=false" >> $GITHUB_OUTPUT
            echo "MPICH artifact ${ARTIFACT_NAME} does not exist, will upload"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload MPICH artifact (for caching across jobs)
        uses: actions/upload-artifact@v6
        if: needs.prepare-build-plan.outputs.download_mpich == 'true' && steps.cache-mpich.outputs.cache-hit != 'true' && steps.check-mpich-artifact.outputs.artifact_exists != 'true'
        with:
          name: ${{ steps.check-mpich-artifact.outputs.artifact_name }}
          path: Containerfiles/mpich-${{ needs.prepare-build-plan.outputs.mpich_version }}.tar.gz
          retention-days: 10

      - name: Check if SST sources artifact exists
        id: check-sst-artifact
        if: needs.prepare-build-plan.outputs.download_sst_core == 'true' && ((steps.sst-cache-config.outputs.needs_elements == 'false' && steps.cache-sst-core.outputs.cache-hit != 'true') || (steps.sst-cache-config.outputs.needs_elements == 'true' && steps.cache-sst-full.outputs.cache-hit != 'true'))
        run: |
          if [[ "${{ steps.sst-cache-config.outputs.needs_elements }}" == "true" ]]; then
            ARTIFACT_NAME="sst-sources-full-${{ needs.prepare-build-plan.outputs.sst_version }}-${{ steps.sst-cache-config.outputs.effective_elements_version }}"
          else
            ARTIFACT_NAME="sst-sources-core-${{ needs.prepare-build-plan.outputs.sst_version }}"
          fi
          echo "artifact_name=${ARTIFACT_NAME}" >> $GITHUB_OUTPUT

          # Check if artifact already exists from another job
          if gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts --paginate | jq -r '.artifacts[].name' | grep -Fxq "${ARTIFACT_NAME}"; then
            echo "artifact_exists=true" >> $GITHUB_OUTPUT
            echo "SST sources artifact ${ARTIFACT_NAME} already exists, skipping upload"
          else
            echo "artifact_exists=false" >> $GITHUB_OUTPUT
            echo "SST sources artifact ${ARTIFACT_NAME} does not exist, will upload"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SST sources artifact (core-only)
        uses: actions/upload-artifact@v6
        if: needs.prepare-build-plan.outputs.download_sst_core == 'true' && steps.cache-sst-core.outputs.cache-hit != 'true' && steps.check-sst-artifact.outputs.artifact_exists != 'true' && steps.sst-cache-config.outputs.needs_elements == 'false'
        with:
          name: ${{ steps.check-sst-artifact.outputs.artifact_name }}
          path: Containerfiles/sstcore-${{ needs.prepare-build-plan.outputs.sst_version }}.tar.gz
          retention-days: 10

      - name: Upload SST sources artifact (full)
        uses: actions/upload-artifact@v6
        if: needs.prepare-build-plan.outputs.download_sst_core == 'true' && steps.cache-sst-full.outputs.cache-hit != 'true' && steps.check-sst-artifact.outputs.artifact_exists != 'true' && steps.sst-cache-config.outputs.needs_elements == 'true'
        with:
          name: ${{ steps.check-sst-artifact.outputs.artifact_name }}
          path: |
            Containerfiles/sstcore-${{ needs.prepare-build-plan.outputs.sst_version }}.tar.gz
            Containerfiles/sstelements-${{ steps.sst-cache-config.outputs.effective_elements_version }}.tar.gz
          retention-days: 10

  create-manifest:
    runs-on: ubuntu-latest
    needs: [build-containers, prepare-build-plan]
    if: needs.build-containers.result == 'success'
    permissions:
      contents: read
      packages: write
    outputs:
      built_images: ${{ steps.manifest.outputs.built_images }}
      manifest_tag: ${{ steps.manifest.outputs.manifest_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-architecture manifest
        id: manifest
        run: |
          PLATFORMS="${{ inputs.build_platforms }}"

          MANIFEST_TAG="${{ needs.prepare-build-plan.outputs.manifest_tag }}"

          echo "Creating manifest: ${MANIFEST_TAG}"

          source scripts/lib/config.sh

          IMAGES=$(collect_verified_manifest_images "${MANIFEST_TAG}" "$PLATFORMS")

          MANIFESTS=()
          while IFS= read -r manifest_ref; do
            if [ -n "$manifest_ref" ]; then
              MANIFESTS+=("$manifest_ref")
            fi
          done < <(echo "$IMAGES" | jq -r '.[]')

          echo "built_images=${IMAGES}" >> $GITHUB_OUTPUT

          if [ ${#MANIFESTS[@]} -gt 0 ]; then
            echo "Creating multi-arch manifest: ${MANIFEST_TAG}"
            docker buildx imagetools create --tag "${MANIFEST_TAG}" "${MANIFESTS[@]}"

            ALIAS_TAGS='${{ needs.prepare-build-plan.outputs.alias_tags_json }}'
            if [[ "$(echo "$ALIAS_TAGS" | jq 'length')" -gt 0 ]]; then
              while IFS= read -r alias_tag; do
                if [[ -n "$alias_tag" ]]; then
                  echo "Creating alias manifest: ${alias_tag}"
                  docker buildx imagetools create --tag "${alias_tag}" "${MANIFESTS[@]}"
                fi
              done < <(echo "$ALIAS_TAGS" | jq -r '.[]')
            fi

            echo "manifest_tag=${MANIFEST_TAG}" >> $GITHUB_OUTPUT
          else
            echo "ERROR: No images found for manifest creation"
            exit 1
          fi
