name: _Reusable Validate Containers (internal use only)

on:
  workflow_call:
    inputs:
      container_type:
        description: 'Type of container to validate'
        required: true
        type: string  # 'core', 'full', 'dev', 'custom', 'experiment'

      image_tags:
        description: 'JSON array of image tags to validate'
        required: true
        type: string

      build_platforms:
        description: 'Platforms that were built'
        required: true
        type: string

      max_image_size_mb:
        description: 'Maximum allowed image size in MB'
        required: false
        default: 2048  # 2GB default
        type: number

      validation_mode:
        description: 'Validation mode to apply'
        required: false
        default: 'full'
        type: string

    outputs:
      validation_successful:
        description: 'Whether all validations passed'
        value: ${{ jobs.validate-containers.result == 'success' }}

jobs:
  prepare-validation:
    runs-on: ubuntu-latest
    outputs:
      platforms: ${{ steps.setup.outputs.platforms }}
    steps:
      - name: Setup validation matrix
        id: setup
        run: |
          PLATFORMS="${{ inputs.build_platforms }}"
          echo "platforms=$(echo "$PLATFORMS" | jq -R -c 'split(",")' )" >> $GITHUB_OUTPUT

  validate-containers:
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    needs: [prepare-validation]
    permissions:
      contents: read
      packages: read
    strategy:
      matrix:
        platform: ${{ fromJson(needs.prepare-validation.outputs.platforms) }}
    steps:
      - name: Extract platform info
        id: platform
        run: |
          PLATFORM="${{ matrix.platform }}"
          ARCH="${PLATFORM##*/}"
          echo "arch=$ARCH" >> $GITHUB_OUTPUT

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Find image for this architecture
        id: find-image
        run: |
          ARCH="${{ steps.platform.outputs.arch }}"
          TAGS='${{ inputs.image_tags }}'
          IMAGE_TAG=$(echo "$TAGS" | jq -r ".[] | select(endswith(\"-${ARCH}\"))")

          if [ -z "$IMAGE_TAG" ]; then
            echo "No image found for architecture: $ARCH"
            exit 1
          fi

          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Validate container
        env:
          IMAGE_TAG: ${{ steps.find-image.outputs.image_tag }}
          PLATFORM: ${{ matrix.platform }}
          MAX_SIZE_MB: ${{ inputs.max_image_size_mb }}
          VALIDATION_MODE: ${{ inputs.validation_mode }}
        run: ./scripts/orchestration/validate-container.sh
