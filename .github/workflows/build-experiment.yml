name: Build Experiment Container

# Build specialized containers for specific experiments
# Supports custom base images and experiment-specific configurations

on:
  workflow_dispatch:
    inputs:
      experiment_name:
        description: 'Name of the experiment directory (must exist in repository)'
        required: true
        type: string
      base_image:
        description: 'Base image (only used if experiment has no custom Containerfile). Examples: sst-core:latest, sst-full:15.1.0. Full registry paths also supported: ghcr.io/user/image:tag'
        required: false
        default: 'sst-core:latest'
        type: string
      build_platforms:
        description: 'Platforms to build for'
        required: false
        default: 'linux/amd64,linux/arm64'
        type: choice
        options:
          - 'linux/amd64,linux/arm64'
          - 'linux/amd64'
          - 'linux/arm64'
      tag_suffix:
        description: 'Optional tag suffix (default: latest)'
        required: false
        default: 'latest'
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  build-experiment-containers:
    uses: ./.github/workflows/_reusable-build-containers.yml
    permissions:
      contents: read
      packages: write
    with:
      container_type: 'experiment'
      image_prefix: '${{ github.repository_owner }}'
      tag_suffix: '${{ inputs.tag_suffix }}'
      build_platforms: '${{ inputs.build_platforms }}'
      experiment_name: '${{ inputs.experiment_name }}'
      base_image: '${{ inputs.base_image }}'
    secrets: inherit

  validate-experiment-containers:
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/_reusable-validate-containers.yml
    needs: [build-experiment-containers]
    if: needs.build-experiment-containers.result == 'success'
    with:
      container_type: 'experiment'
      image_tags: '${{ needs.build-experiment-containers.outputs.built_images }}'
      build_platforms: '${{ inputs.build_platforms }}'
      max_image_size_mb: ${{ fromJson(needs.build-experiment-containers.outputs.max_image_size_mb) }}
      validation_mode: '${{ needs.build-experiment-containers.outputs.validation_mode }}'
    secrets: inherit

  generate-summary:
    uses: ./.github/workflows/_reusable-generate-summary.yml
    needs: [build-experiment-containers, validate-experiment-containers]
    if: always()
    with:
      workflow_type: 'experiment'
      container_type: 'experiment'
      build_successful: ${{ needs.build-experiment-containers.result == 'success' }}
      manifest_successful: ${{ needs.build-experiment-containers.result == 'success' }}
      validation_successful: ${{ needs.validate-experiment-containers.result == 'success' }}
      manifest_tag: '${{ needs.build-experiment-containers.outputs.manifest_tag }}'
      built_images: '${{ needs.build-experiment-containers.outputs.built_images }}'
      build_platforms: '${{ inputs.build_platforms }}'
      tag_suffix: '${{ needs.build-experiment-containers.outputs.resolved_tag_suffix }}'
      alias_tags_json: '${{ needs.build-experiment-containers.outputs.alias_tags_json }}'
      experiment_name: '${{ inputs.experiment_name }}'
