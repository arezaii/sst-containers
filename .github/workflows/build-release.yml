name: Build SST Release Containers

# Build containers from official SST releases
# Creates both core and full variants from stable release tarballs

on:
  workflow_dispatch:
    inputs:
      sst_version:
        description: 'SST version to build (e.g., 15.1.0, 15.0.0)'
        required: true
        type: string
      sst_elements_version:
        description: 'SST-elements version for full builds (defaults to sst_version)'
        required: false
        type: string
      container_types:
        description: 'Container types to build'
        required: false
        default: 'core,full'
        type: choice
        options:
          - 'core,full'
          - 'core'
          - 'full'
      mpich_version:
        description: 'MPICH version to use'
        required: false
        default: '4.0.2'
        type: string
      force_rebuild:
        description: 'Force rebuild even if containers exist'
        required: false
        default: false
        type: boolean
      ignore_cache:
        description: 'Ignore cached tarballs and redownload'
        required: false
        default: false
        type: boolean
      build_platforms:
        description: 'Platforms to build for'
        required: false
        default: 'linux/amd64,linux/arm64'
        type: choice
        options:
          - 'linux/amd64,linux/arm64'
          - 'linux/amd64'
          - 'linux/arm64'
      tag_as_latest:
        description: 'Also tag this version as "latest"'
        required: false
        default: false
        type: boolean
      enable_perf_tracking:
        description: 'Enable SST performance tracking (WARNING: adds runtime overhead, not for production)'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io

jobs:
  build-core-containers:
    if: contains(inputs.container_types, 'core')
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/_reusable-build-containers.yml
    with:
      container_type: 'core'
      image_prefix: '${{ github.repository_owner }}/sst'
      tag_suffix: '${{ inputs.sst_version }}'
      build_platforms: '${{ inputs.build_platforms }}'
      sst_version: '${{ inputs.sst_version }}'
      mpich_version: '${{ inputs.mpich_version }}'
      containerfile_path: 'Containerfiles/Containerfile'
      docker_context: 'Containerfiles'
      build_target: 'sst-core'
      force_rebuild: ${{ inputs.force_rebuild }}
      ignore_cache: ${{ inputs.ignore_cache }}
      enable_perf_tracking: ${{ inputs.enable_perf_tracking }}
    secrets: inherit

  build-full-containers:
    if: contains(inputs.container_types, 'full')
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/_reusable-build-containers.yml
    with:
      container_type: 'full'
      image_prefix: '${{ github.repository_owner }}/sst'
      tag_suffix: '${{ inputs.sst_version }}'
      build_platforms: '${{ inputs.build_platforms }}'
      sst_version: '${{ inputs.sst_version }}'
      sst_elements_version: '${{ inputs.sst_elements_version }}'
      mpich_version: '${{ inputs.mpich_version }}'
      containerfile_path: 'Containerfiles/Containerfile'
      docker_context: 'Containerfiles'
      build_target: 'sst-full'
      force_rebuild: ${{ inputs.force_rebuild }}
      ignore_cache: ${{ inputs.ignore_cache }}
      enable_perf_tracking: ${{ inputs.enable_perf_tracking }}
    secrets: inherit

  validate-core-containers:
    if: contains(inputs.container_types, 'core') && needs.build-core-containers.result == 'success'
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/_reusable-validate-containers.yml
    needs: [build-core-containers]
    with:
      container_type: 'core'
      image_tags: '${{ needs.build-core-containers.outputs.built_images }}'
      build_platforms: '${{ inputs.build_platforms }}'
      max_image_size_mb: 2048  # 2GB - enough for core
    secrets: inherit

  validate-full-containers:
    if: contains(inputs.container_types, 'full') && needs.build-full-containers.result == 'success'
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/_reusable-validate-containers.yml
    needs: [build-full-containers]
    with:
      container_type: 'full'
      image_tags: '${{ needs.build-full-containers.outputs.built_images }}'
      build_platforms: '${{ inputs.build_platforms }}'
      max_image_size_mb: 4096  # 4GB - full build is larger
    secrets: inherit

  generate-summary:
    uses: ./.github/workflows/_reusable-generate-summary.yml
    needs: [build-core-containers, build-full-containers, validate-core-containers, validate-full-containers]
    if: always()
    with:
      workflow_type: 'release'
      container_type: '${{ inputs.container_types }}'
      build_successful: ${{ (needs.build-core-containers.result == 'success' || needs.build-core-containers.result == 'skipped') && (needs.build-full-containers.result == 'success' || needs.build-full-containers.result == 'skipped') }}
      manifest_successful: ${{ (needs.build-core-containers.result == 'success' || needs.build-core-containers.result == 'skipped') && (needs.build-full-containers.result == 'success' || needs.build-full-containers.result == 'skipped') }}
      validation_successful: ${{ (needs.validate-core-containers.result == 'success' || needs.validate-core-containers.result == 'skipped') && (needs.validate-full-containers.result == 'success' || needs.validate-full-containers.result == 'skipped') }}
      manifest_tag: '${{ needs.build-core-containers.outputs.manifest_tag || needs.build-full-containers.outputs.manifest_tag }}'
      built_images: '${{ needs.build-core-containers.outputs.built_images || needs.build-full-containers.outputs.built_images }}'
      build_platforms: '${{ inputs.build_platforms }}'
      tag_suffix: '${{ inputs.sst_version }}'
      sst_version: '${{ inputs.sst_version }}'
      mpich_version: '${{ inputs.mpich_version }}'

  # Optional: Tag as latest if requested
  tag-as-latest:
    runs-on: ubuntu-latest
    needs: [build-core-containers, build-full-containers]
    if: inputs.tag_as_latest && (
        (contains(inputs.container_types, 'core') == false || needs.build-core-containers.result == 'success') &&
        (contains(inputs.container_types, 'full') == false || needs.build-full-containers.result == 'success')
      )
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag containers as latest
        run: |
          # Source the configuration library for tagging functions
          source scripts/lib/config.sh

          echo "Tagging containers as 'latest'"

          # Function to process built images from a job and create latest tags
          process_job_images() {
            local job_name="$1"
            local job_result="$2"
            local built_images="$3"

            if [[ "$job_result" != "success" ]]; then
              echo "Skipping $job_name (result: $job_result)"
              return
            fi

            echo "Processing $job_name for latest tagging..."

            # Generate tagging information using library function
            local tagging_info
            tagging_info=$(generate_latest_tagging_info "$built_images")

            if [[ "$(echo "$tagging_info" | jq 'length')" -eq 0 ]]; then
              echo "Warning: No tagging information generated for $job_name"
              return
            fi

            # Process each base image for latest tagging
            echo "$tagging_info" | jq -c '.[]' | while read -r entry; do
              local base_name latest_tag
              base_name=$(echo "$entry" | jq -r '.base_name')
              latest_tag=$(echo "$entry" | jq -r '.latest_tag')

              echo "  Creating latest tag: $latest_tag"
              echo "  Base name: $base_name"

              # Get platform images for this base
              local platform_images=()
              while IFS= read -r img; do
                if [[ -n "$img" ]]; then
                  platform_images+=("$img")
                  echo "    Platform image: $img"
                fi
              done < <(echo "$entry" | jq -r '.platform_images[]')

              if [[ ${#platform_images[@]} -gt 0 ]]; then
                # Create the latest tag from all platform images
                echo "  Executing: docker buildx imagetools create --tag '$latest_tag' ${platform_images[*]}"
                docker buildx imagetools create --tag "$latest_tag" "${platform_images[@]}"
                echo "  [SUCCESS] Created: $latest_tag"
              else
                echo "  Warning: No platform images found for $base_name"
              fi
            done
          }

          # Process all build jobs that completed successfully
          process_job_images "build-core-containers" "${{ needs.build-core-containers.result }}" '${{ needs.build-core-containers.outputs.built_images }}'
          process_job_images "build-full-containers" "${{ needs.build-full-containers.result }}" '${{ needs.build-full-containers.outputs.built_images }}'

          echo "Latest tagging completed!"
